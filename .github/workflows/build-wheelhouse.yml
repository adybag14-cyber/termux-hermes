name: Build immutable arm64 wheelhouse

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: New immutable GitHub release tag
        required: true
        default: wheelhouse-cp313-android24-arm64-20260719.1
        type: string
      publish_release:
        description: Publish verified wheels as a GitHub release
        required: true
        default: true
        type: boolean

permissions:
  contents: write

concurrency:
  group: termux-arm64-wheelhouse
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 180
    env:
      TERMUX_IMAGE: termux/termux-docker@sha256:3aed9c7fbcf9195a9919deaad418da006232864a779fb4f322d68a34887a2e15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Refuse mutable release updates
        if: ${{ inputs.publish_release }}
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          set -euo pipefail
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            echo "Release $RELEASE_TAG already exists; immutable releases cannot be overwritten" >&2
            exit 1
          fi
          if git ls-remote --exit-code --tags origin "refs/tags/$RELEASE_TAG" >/dev/null 2>&1; then
            echo "Tag $RELEASE_TAG already exists; choose a new immutable tag" >&2
            exit 1
          fi

      - name: Verify native ARM runner and pinned official Termux image
        run: |
          set -euo pipefail
          case "$(uname -m)" in
            aarch64|arm64) ;;
            *) echo "Runner is not arm64: $(uname -m)" >&2; exit 1 ;;
          esac
          docker pull "$TERMUX_IMAGE"
          test "$(docker image inspect --format '{{.Architecture}}' "$TERMUX_IMAGE")" = arm64
          docker run --rm --privileged "$TERMUX_IMAGE" uname -m | grep -E '^(aarch64|arm64)$'

      - name: Build and verify all locked wheels in official aarch64 Termux
        run: |
          set -euo pipefail
          BUILD_DIR="$RUNNER_TEMP/termux-hermes-build"
          rm -rf "$BUILD_DIR"
          mkdir -p "$BUILD_DIR"
          chmod 0777 "$BUILD_DIR"
          docker run --rm --privileged \
            --security-opt seccomp=unconfined \
            -e CI=true \
            -v "$GITHUB_WORKSPACE:/workspace:ro" \
            -v "$BUILD_DIR:/build" \
            "$TERMUX_IMAGE" \
            bash /workspace/scripts/termux_build.sh /workspace /build docker

      - name: Collect verified wheelhouse
        run: |
          set -euo pipefail
          BUILD_DIR="$RUNNER_TEMP/termux-hermes-build"
          mkdir -p release
          cp -a "$BUILD_DIR/wheelhouse/." release/
          (cd release && sha256sum -c SHA256SUMS)
          test "$(find release -maxdepth 1 -name '*.whl' | wc -l)" -eq 10
          test -s release/index.json
          test -s release/system-packages.txt
          ls -lh release

      - name: Upload wheelhouse artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: termux-hermes-cp313-android24-arm64
          path: |
            release/*.whl
            release/index.json
            release/SHA256SUMS
            release/system-packages.txt
            manifest/wheels.json
            audit/resolved.txt
            audit/emulator-audit.json
          if-no-files-found: error
          compression-level: 0

      - name: Publish new immutable release
        if: ${{ inputs.publish_release }}
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          set -euo pipefail
          cat > release-notes.md <<EOF
          Native Hermes Termux wheelhouse for CPython 3.13 / Android API 24 / arm64-v8a.

          Package discovery and the binary-only 91-package install were verified in the official Termux v0.118.3 app on Android 15.
          The arm64 artifacts were built on a native ARM GitHub runner in the official Termux Docker image pinned to:
          $TERMUX_IMAGE

          Sources, versions and SHA-256 digests are locked in manifest/wheels.json.
          The complete 91-package Hermes Termux graph installed with --only-binary :all: and passed native import and dependency checks.

          Commit: $GITHUB_SHA
          EOF
          gh release create "$RELEASE_TAG" \
            release/*.whl release/index.json release/SHA256SUMS release/system-packages.txt \
            manifest/wheels.json audit/resolved.txt audit/emulator-audit.json \
            --target "$GITHUB_SHA" \
            --title "Hermes Termux CPython 3.13 Android arm64 wheelhouse" \
            --notes-file release-notes.md

      - name: Show container state on failure
        if: failure()
        run: |
          docker images || true
          find "$RUNNER_TEMP/termux-hermes-build" -maxdepth 3 -type f -ls 2>/dev/null || true
