name: Build immutable arm64 wheelhouse

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: New immutable GitHub release tag
        required: true
        default: wheelhouse-cp313-android24-arm64-20260719.1
        type: string
      publish_release:
        description: Publish verified wheels as a GitHub release
        required: true
        default: true
        type: boolean

permissions:
  contents: write

concurrency:
  group: termux-arm64-wheelhouse
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 180
    env:
      ANDROID_HOME: /usr/local/lib/android/sdk
      ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
      AVD_NAME: termux_arm64_api35
      SYSTEM_IMAGE: system-images;android-35;google_apis;arm64-v8a
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Refuse mutable release updates
        if: ${{ inputs.publish_release }}
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          set -euo pipefail
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            echo "Release $RELEASE_TAG already exists; immutable releases cannot be overwritten" >&2
            exit 1
          fi
          if git ls-remote --exit-code --tags origin "refs/tags/$RELEASE_TAG" >/dev/null 2>&1; then
            echo "Tag $RELEASE_TAG already exists; choose a new immutable tag" >&2
            exit 1
          fi

      - name: Install current ARM64 Android emulator and image
        run: |
          set -euo pipefail
          test -d "$ANDROID_HOME" || { echo "Android SDK missing at $ANDROID_HOME" >&2; exit 1; }
          SDKMANAGER="$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager"
          AVDMANAGER="$ANDROID_HOME/cmdline-tools/latest/bin/avdmanager"
          test -x "$SDKMANAGER"
          test -x "$AVDMANAGER"
          yes | "$SDKMANAGER" --licenses >/dev/null || true
          "$SDKMANAGER" --install "platform-tools" "emulator" "$SYSTEM_IMAGE"
          "$ANDROID_HOME/emulator/emulator" -version
          file "$ANDROID_HOME/emulator/emulator"
          echo no | "$AVDMANAGER" create avd --force --name "$AVD_NAME" --package "$SYSTEM_IMAGE"

      - name: Boot native ARM64 Android emulator
        run: |
          set -euo pipefail
          if [[ -w /dev/kvm ]]; then
            ACCEL=on
          else
            ACCEL=off
          fi
          nohup "$ANDROID_HOME/emulator/emulator" \
            -avd "$AVD_NAME" \
            -no-window -no-audio -no-boot-anim -no-snapshot \
            -gpu swiftshader_indirect -accel "$ACCEL" \
            -netdelay none -netspeed full \
            > emulator.log 2>&1 &
          echo $! > emulator.pid
          adb wait-for-device
          timeout 1200 bash -c 'until [[ "$(adb shell getprop sys.boot_completed 2>/dev/null | tr -d "\r")" == 1 ]]; do sleep 5; done'
          adb shell input keyevent 82 || true
          echo "ABI=$(adb shell getprop ro.product.cpu.abi | tr -d '\r')"
          echo "Android=$(adb shell getprop ro.build.version.release | tr -d '\r')"
          test "$(adb shell getprop ro.product.cpu.abi | tr -d '\r')" = arm64-v8a

      - name: Install pinned official Termux APK
        run: |
          set -euo pipefail
          readarray -t APK_DATA < <(python - <<'PY'
          import json
          m=json.load(open('manifest/wheels.json'))['termux']
          print(m['app_url'])
          print(m['app_sha256'])
          PY
          )
          curl -fL --retry 6 --retry-all-errors "${APK_DATA[0]}" -o termux.apk
          printf '%s  %s\n' "${APK_DATA[1]}" termux.apk | sha256sum -c -
          adb install -r termux.apk
          adb shell am start -W -n com.termux/.app.TermuxActivity
          timeout 300 bash -c 'until adb shell run-as com.termux test -x /data/data/com.termux/files/usr/bin/bash 2>/dev/null; do sleep 3; done'
          adb shell run-as com.termux /data/data/com.termux/files/usr/bin/bash -lc 'id; uname -a'

      - name: Build and verify all locked wheels inside Termux
        run: |
          set -euo pipefail
          adb push . /data/local/tmp/termux-hermes
          adb shell chmod -R a+rX /data/local/tmp/termux-hermes
          adb shell run-as com.termux \
            /data/data/com.termux/files/usr/bin/bash \
            /data/local/tmp/termux-hermes/scripts/termux_build.sh \
            /data/local/tmp/termux-hermes \
            /data/data/com.termux/files/home/termux-hermes-build

      - name: Pull verified wheelhouse
        run: |
          set -euo pipefail
          adb exec-out run-as com.termux \
            /data/data/com.termux/files/usr/bin/tar \
            -C /data/data/com.termux/files/home/termux-hermes-build/wheelhouse \
            -czf - . > wheelhouse.tar.gz
          mkdir release
          tar -xzf wheelhouse.tar.gz -C release
          (cd release && sha256sum -c SHA256SUMS)
          test "$(find release -maxdepth 1 -name '*.whl' | wc -l)" -eq 10
          ls -lh release

      - name: Upload wheelhouse artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: termux-hermes-cp313-android24-arm64
          path: |
            release/*.whl
            release/index.json
            release/SHA256SUMS
            manifest/wheels.json
            audit/resolved.txt
          if-no-files-found: error
          compression-level: 0

      - name: Publish new immutable release
        if: ${{ inputs.publish_release }}
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          set -euo pipefail
          cat > release-notes.md <<EOF
          Native Hermes Termux wheelhouse for CPython 3.13 / Android API 24 / arm64-v8a.

          Built inside the official Termux v0.118.3 app on an ARM64 Android emulator.
          Sources, versions and SHA-256 digests are locked in manifest/wheels.json.
          The complete 91-package Hermes Termux graph installed with --only-binary :all: and passed import and dependency checks.

          Commit: $GITHUB_SHA
          EOF
          gh release create "$RELEASE_TAG" \
            release/*.whl release/index.json release/SHA256SUMS \
            manifest/wheels.json audit/resolved.txt \
            --target "$GITHUB_SHA" \
            --title "Hermes Termux CPython 3.13 Android arm64 wheelhouse" \
            --notes-file release-notes.md

      - name: Show emulator log on failure
        if: failure()
        run: tail -n 300 emulator.log || true
