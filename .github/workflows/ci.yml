name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  tests:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"
      - name: Install test dependencies
        run: python -m pip install packaging==26.0 pytest==9.0.2
      - name: Compile Python
        run: python -m compileall -q scripts tests
      - name: Run unit tests
        run: python -m pytest -q
      - name: Check shell syntax
        run: bash -n scripts/termux_build.sh
      - name: Validate JSON
        run: |
          python -m json.tool manifest/wheels.json >/dev/null
          python -m json.tool audit/emulator-audit.json >/dev/null
          python -m json.tool audit/build-metadata.json >/dev/null
